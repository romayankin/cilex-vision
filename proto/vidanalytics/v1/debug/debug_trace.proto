syntax = "proto3";

package vidanalytics.v1.debug;

option java_multiple_files = true;
option java_package = "com.cilexvision.vidanalytics.v1.debug";

import "google/protobuf/timestamp.proto";

// DebugSourceType identifies what entity a DebugTrace is attached to.
enum DebugSourceType {
  DEBUG_SOURCE_TYPE_UNSPECIFIED = 0;
  DEBUG_SOURCE_TYPE_FRAME = 1;
  DEBUG_SOURCE_TYPE_DETECTION = 2;
  DEBUG_SOURCE_TYPE_TRACKLET = 3;
  DEBUG_SOURCE_TYPE_EVENT = 4;
}

// PipelineStage records the timing of a single named processing stage for one
// unit of work (frame, detection, event, etc.).
message PipelineStage {
  // Name of the pipeline stage (e.g. "decode", "infer", "track", "publish").
  string stage_name = 1;

  // Wall-clock timestamp when this unit of work entered the stage.
  google.protobuf.Timestamp entry_ts = 2;

  // Wall-clock timestamp when this unit of work exited the stage.
  google.protobuf.Timestamp exit_ts = 3;

  // Stage duration in microseconds (exit_ts − entry_ts).
  int64 duration_us = 4;

  // Hostname or Kubernetes pod name of the service instance that handled this stage.
  string service_instance = 5;
}

// DebugTrace collects per-stage timing information for a single message as it
// flows through the processing pipeline. Used for latency diagnostics and
// performance profiling.
//
// Traces are sampled at a configurable rate to avoid excessive storage overhead.
// When is_sampled is false, only summary fields are populated.
message DebugTrace {
  // Unique trace identifier. Format: UUID v4.
  string trace_id = 1;

  // Identifier of the entity this trace is attached to (frame_id, detection_id, etc.).
  string source_id = 2;

  // Type of entity identified by source_id.
  DebugSourceType source_type = 3;

  // Ordered list of pipeline stage timing records.
  // Only populated when is_sampled is true.
  repeated PipelineStage stages = 4;

  // Arbitrary key-value labels for additional diagnostic context
  // (e.g. {"model": "yolov8n", "gpu": "0", "batch_size": "8"}).
  map<string, string> labels = 5;

  // True if this trace was selected for full detailed logging.
  // When false, only trace_id, source_id, and source_type are guaranteed.
  bool is_sampled = 6;

  // Sampling rate used to select this trace: 1-in-N frames are fully traced.
  // 0 means every message is traced (tracing always on).
  int32 sample_rate = 7;
}
