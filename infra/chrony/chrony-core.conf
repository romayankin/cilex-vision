# P0-D07 core Chrony template
# Replace the cmdallow subnet with the internal monitoring network before deployment.

pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst

driftfile /var/lib/chrony/drift
dumpdir /var/lib/chrony
logdir /var/log/chrony

makestep 1 3
rtcsync
leapsectz right/UTC

log tracking measurements statistics
dumponexit

# Allow the monitoring tier to query `tracking` over the Chrony command port.
bindcmdaddress 0.0.0.0
bindcmdaddress ::
cmdallow 10.42.0.0/16

# Optional: uncomment only if this core node is intentionally serving time to
# an internal subnet during an isolated-site deployment.
# allow 10.42.0.0/16
# local stratum 10 orphan
