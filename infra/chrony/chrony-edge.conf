# P0-D07 edge Chrony template
# Replace the cmdallow subnet with the internal monitoring network before deployment.

pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst

driftfile /var/lib/chrony/drift
dumpdir /var/lib/chrony
logdir /var/log/chrony

makestep 1 3
rtcsync
leapsectz right/UTC

log tracking measurements statistics
dumponexit

# Allow remote read-only chronyc queries from the monitoring network only.
bindcmdaddress 0.0.0.0
bindcmdaddress ::
cmdallow 10.42.0.0/16
