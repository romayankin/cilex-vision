global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: minio-cluster
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - minio:9000

  - job_name: minio-bucket
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets:
          - minio:9000

  - job_name: minio-resource
    metrics_path: /minio/v2/metrics/resource
    static_configs:
      - targets:
          - minio:9000

  - job_name: minio-node
    metrics_path: /minio/v2/metrics/node
    static_configs:
      - targets:
          - minio:9000

  - job_name: inference-worker
    static_configs:
      - targets:
          - inference-worker:9090

  - job_name: query-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - query-api:8000
