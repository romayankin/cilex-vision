services:
  kafka-0:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-0
    hostname: kafka-0
    ports:
      - "19092:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-0:9092,EXTERNAL://localhost:19092"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_0_data:/bitnami/kafka
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-1:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "19093:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:19093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_1_data:/bitnami/kafka
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-2:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-2
    hostname: kafka-2
    ports:
      - "19094:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_CFG_NODE_ID: "2"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:19094"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_2_data:/bitnami/kafka
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-0:9092,kafka-1:9092,kafka-2:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://localhost:8080/actuator/health | grep -q UP
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  nats:
    image: nats:2.10.18-alpine
    container_name: nats
    command:
      - --jetstream
      - --store_dir
      - /data
      - --http_port
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost:8222/healthz
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  timescaledb:
    image: timescale/timescaledb:2.18.1-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-cilex}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cilex_dev_password}"
      POSTGRES_DB: "${POSTGRES_DB:-vidanalytics}"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-06-11T03-13-30Z
    container_name: minio
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:9000/minio/health/live >/dev/null
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        mc mb -p local/raw-video || true;
        mc mb -p local/frame-blobs || true;
        mc mb -p local/decoded-frames || true;
        mc mb -p local/event-clips || true;
        mc mb -p local/debug-traces || true;
        mc mb -p local/thumbnails || true;
        mc mb -p local/archive-warm || true;
        mc mb -p local/mtmc-checkpoints || true;
        mc ilm rule ls local/frame-blobs >/dev/null 2>&1 || mc ilm rule add local/frame-blobs --expire-days 7 || true;
        mc ilm rule ls local/decoded-frames >/dev/null 2>&1 || mc ilm rule add local/decoded-frames --expire-days 3 || true;
        mc ilm rule ls local/debug-traces >/dev/null 2>&1 || mc ilm rule add local/debug-traces --expire-days 30 || true;
        mc ilm rule ls local/thumbnails >/dev/null 2>&1 || mc ilm rule add local/thumbnails --expire-days 30 || true;
        mc ilm rule ls local/raw-video >/dev/null 2>&1 || mc ilm rule add local/raw-video --expire-days 30 || true;
        exec tail -f /dev/null
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    healthcheck:
      test:
        - CMD-SHELL
        - mc ls local/raw-video >/dev/null 2>&1 && mc ls local/frame-blobs >/dev/null 2>&1 && mc ls local/decoded-frames >/dev/null 2>&1 && mc ls local/event-clips >/dev/null 2>&1 && mc ls local/debug-traces >/dev/null 2>&1 && mc ls local/thumbnails >/dev/null 2>&1 && mc ls local/archive-warm >/dev/null 2>&1 && mc ls local/mtmc-checkpoints >/dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.0-alpine
    container_name: redis
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost:9090/-/healthy
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.1.3
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://localhost:3000/api/health | grep -q ok
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: go2rtc
    ports:
      - "1984:1984"
      - "8554:8554"
    volumes:
      - ./dev/go2rtc.yaml:/config/go2rtc.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: mlflow
    depends_on:
      timescaledb:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-cilex}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cilex_dev_password}"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_DEFAULT_REGION: "us-east-1"
    command:
      - /bin/sh
      - -ec
      - |
        pip install --no-cache-dir mlflow==2.14.3 psycopg2-binary==2.9.9 boto3==1.34.144;
        exec mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@timescaledb:5432/mlflow \
          --artifacts-destination s3://debug-traces/mlflow \
          --serve-artifacts
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/').read()"
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ====================================================================
  #  Application services
  # ====================================================================

  edge-agent:
    build:
      context: ..
      dockerfile: services/edge-agent/Dockerfile
    container_name: edge-agent
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    environment:
      EDGE_LOG_LEVEL: INFO
    volumes:
      - ./dev/edge-agent.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    restart: unless-stopped

  ingress-bridge:
    build:
      context: ..
      dockerfile: services/ingress-bridge/Dockerfile
    container_name: ingress-bridge
    depends_on:
      nats:
        condition: service_healthy
      kafka-0:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    command: ["python", "main.py", "--config", "/app/config.yaml"]
    environment:
      BRIDGE_LOG_LEVEL: INFO
    volumes:
      - ./dev/ingress-bridge.yaml:/app/config.yaml:ro
    mem_limit: 512m
    restart: unless-stopped

  decode-service:
    build:
      context: ..
      dockerfile: services/decode-service/Dockerfile
    container_name: decode-service
    depends_on:
      kafka-0:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    environment:
      DECODE_KAFKA__BOOTSTRAP_SERVERS: kafka-0:9092
      DECODE_KAFKA__SECURITY_PROTOCOL: PLAINTEXT
      DECODE_KAFKA__INPUT_TOPIC: frames.sampled.refs
      DECODE_KAFKA__OUTPUT_TOPIC: frames.decoded.refs
      DECODE_MINIO__ENDPOINT: minio:9000
      DECODE_MINIO__ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      DECODE_MINIO__SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      DECODE_MINIO__SECURE: "false"
      DECODE_MINIO__SOURCE_BUCKET: frame-blobs
      DECODE_MINIO__DECODED_BUCKET: decoded-frames
      DECODE_SAMPLER__TARGET_FPS: "5.0"
      DECODE_METRICS_PORT: "9090"
      DECODE_LOG_LEVEL: INFO
    mem_limit: 512m
    restart: unless-stopped

  inference-worker:
    build:
      context: ..
      dockerfile: services/inference-worker/Dockerfile
    container_name: inference-worker
    depends_on:
      kafka-0:
        condition: service_healthy
      minio-init:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "9091:9091"
    environment:
      # No Triton in dev compose — worker will log warnings and retry.
      INFERENCE_TRITON__URL: ""
      INFERENCE_KAFKA__BOOTSTRAP_SERVERS: kafka-0:9092
      INFERENCE_KAFKA__SECURITY_PROTOCOL: PLAINTEXT
      INFERENCE_KAFKA__INPUT_TOPIC: frames.decoded.refs
      INFERENCE_KAFKA__TRACKLET_TOPIC: tracklets.local
      INFERENCE_KAFKA__EMBEDDING_TOPIC: mtmc.active_embeddings
      INFERENCE_KAFKA__DETECTION_TOPIC: bulk.detections
      INFERENCE_KAFKA__CONSUMER_GROUP: detector-worker
      INFERENCE_MINIO__ENDPOINT: minio:9000
      INFERENCE_MINIO__ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      INFERENCE_MINIO__SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      INFERENCE_MINIO__SECURE: "false"
      INFERENCE_THUMBNAIL__ENABLED: "true"
      INFERENCE_THUMBNAIL__BUCKET: thumbnails
      INFERENCE_THUMBNAIL__MAX_PER_TRACK: "50"
      INFERENCE_THUMBNAIL__MIN_CONFIDENCE: "0.50"
      INFERENCE_THUMBNAIL__MAX_WIDTH: "224"
      INFERENCE_THUMBNAIL__QUALITY: "80"
      INFERENCE_METRICS_PORT: "9090"
      INFERENCE_HEALTH_PORT: "9091"
      INFERENCE_DB_URL: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      INFERENCE_LOG_LEVEL: INFO
    mem_limit: 1g
    restart: unless-stopped

  attribute-service:
    build:
      context: ..
      dockerfile: services/attribute-service/Dockerfile
    container_name: attribute-service
    depends_on:
      kafka-0:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    environment:
      ATTR_KAFKA_BOOTSTRAP: kafka-0:9092
      ATTR_KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      ATTR_KAFKA_TOPIC: tracklets.local
      ATTR_MINIO_URL: minio:9000
      ATTR_MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      ATTR_MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      ATTR_MINIO_SECURE: "false"
      ATTR_MINIO_FRAME_BUCKET: frame-blobs
      ATTR_DB_DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      ATTR_LOG_LEVEL: INFO
    mem_limit: 512m
    restart: unless-stopped

  event-engine:
    build:
      context: ..
      dockerfile: services/event-engine/Dockerfile
    container_name: event-engine
    depends_on:
      kafka-0:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      EVENT_KAFKA_BOOTSTRAP: kafka-0:9092
      EVENT_KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      EVENT_KAFKA_INPUT_TOPIC: tracklets.local
      EVENT_KAFKA_OUTPUT_TOPIC: events.raw
      EVENT_DB_DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      EVENT_MOTION_EVENTS_ENABLED: "false"
      EVENT_LOG_LEVEL: INFO
    mem_limit: 512m
    restart: unless-stopped

  clip-service:
    build:
      context: ..
      dockerfile: services/clip-service/Dockerfile
    container_name: clip-service
    depends_on:
      kafka-0:
        condition: service_healthy
      minio-init:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      CLIP_KAFKA_BOOTSTRAP: kafka-0:9092
      CLIP_KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      CLIP_KAFKA_INPUT_TOPIC: events.raw
      CLIP_MINIO_URL: minio:9000
      CLIP_MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      CLIP_MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      CLIP_MINIO_SECURE: "false"
      CLIP_DB_DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      CLIP_LOG_LEVEL: INFO
    mem_limit: 512m
    restart: unless-stopped

  mtmc-service:
    build:
      context: ..
      dockerfile: services/mtmc-service/Dockerfile
    container_name: mtmc-service
    depends_on:
      kafka-0:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    environment:
      MTMC_KAFKA_BOOTSTRAP: kafka-0:9092
      MTMC_KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      MTMC_KAFKA_TOPIC: mtmc.active_embeddings
      MTMC_MINIO_URL: minio:9000
      MTMC_MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MTMC_MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MTMC_MINIO_SECURE: "false"
      MTMC_MINIO_BUCKET: mtmc-checkpoints
      MTMC_DB_DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      MTMC_SITE_ID: "00000000-0000-0000-0000-000000000001"
      MTMC_LOG_LEVEL: INFO
    mem_limit: 1024m
    restart: unless-stopped

  bulk-collector:
    build:
      context: ..
      dockerfile: services/bulk-collector/Dockerfile
    container_name: bulk-collector
    depends_on:
      kafka-0:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    command: ["python", "main.py", "--config", "/dev/null"]
    environment:
      BULK_KAFKA__BOOTSTRAP_SERVERS: kafka-0:9092
      BULK_KAFKA__SECURITY_PROTOCOL: PLAINTEXT
      BULK_KAFKA__SASL_MECHANISM: ""
      BULK_KAFKA__SASL_USERNAME: ""
      BULK_KAFKA__SASL_PASSWORD: ""
      BULK_DATABASE__DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      BULK_METRICS_PORT: "9091"
      BULK_LOG_LEVEL: INFO
    mem_limit: 512m
    restart: unless-stopped

  query-api:
    build:
      context: ..
      dockerfile: services/query-api/Dockerfile
    container_name: query-api
    depends_on:
      timescaledb:
        condition: service_healthy
      minio-init:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      QUERY_DB__DSN: "postgresql://cilex:cilex_dev_password@timescaledb:5432/vidanalytics"
      QUERY_MINIO__ENDPOINT: minio:9000
      QUERY_MINIO__ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      QUERY_MINIO__SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      QUERY_MINIO__SECURE: "false"
      QUERY_JWT__SECRET_KEY: "${JWT_SECRET:-pilot-jwt-secret-change-me}"
      STORAGE_QUOTA_PERCENT: "${STORAGE_QUOTA_PERCENT:-50}"
      QUERY_LOG_LEVEL: INFO
    volumes:
      # Docker socket for ServiceWatchdog (container list / restart / logs).
      # ":ro" only protects the socket file from being replaced — Docker API
      # commands sent over the socket still execute. Container runs as root
      # (image default), so no group_add gymnastics needed.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 512m
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      query-api:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://query-api:8000"
      API_URL: "http://query-api:8000"
    mem_limit: 256m
    restart: unless-stopped

volumes:
  kafka_0_data:
  kafka_1_data:
  kafka_2_data:
