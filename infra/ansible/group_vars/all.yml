---
cilex_root_dir: /opt/cilex
cilex_config_dir: "{{ cilex_root_dir }}/config"
cilex_data_dir: /var/lib/cilex
cilex_bin_dir: "{{ cilex_root_dir }}/bin"

common_apt_packages:
  - ca-certificates
  - curl
  - docker.io
  - jq
  - python3-pip

common_pip_packages:
  - docker==7.1.0

docker_service_name: docker

kafka_image: bitnami/kafka:3.7.0
nats_image: nats:2.10.18-alpine
timescaledb_image: timescale/timescaledb:2.18.1-pg16
minio_image: minio/minio:RELEASE.2024-06-11T03-13-30Z
minio_mc_image: minio/mc:RELEASE.2024-06-11T21-32-12Z
triton_image: nvcr.io/nvidia/tritonserver:24.06-py3
prometheus_image: prom/prometheus:v2.53.1
grafana_image: grafana/grafana:11.1.3
loki_image: grafana/loki:3.1.1
promtail_image: grafana/promtail:3.1.1
node_exporter_image: prom/node-exporter:v1.8.2

mlflow_image: python:3.11-slim
mlflow_port: 5000
mlflow_base_dir: "{{ cilex_root_dir }}/mlflow"
mlflow_data_dir: "{{ cilex_data_dir }}/mlflow"
mlflow_postgres_db: mlflow
mlflow_postgres_user: "{{ timescaledb_postgres_user }}"
mlflow_postgres_password: "{{ timescaledb_postgres_password }}"
mlflow_artifact_bucket: debug-traces
mlflow_artifact_prefix: mlflow

cvat_version: v2.62.0
cvat_server_image: "cvat/server:{{ cvat_version }}"
cvat_ui_image: "cvat/ui:{{ cvat_version }}"
cvat_postgres_image: postgres:15-alpine
cvat_redis_inmem_image: redis:7.2.11-alpine
cvat_kvrocks_image: apache/kvrocks:2.12.1
cvat_traefik_image: traefik:v3.6
cvat_opa_image: openpolicyagent/opa:1.12.2
cvat_http_port: 8080
cvat_bind_address: 127.0.0.1
cvat_host: localhost
cvat_base_dir: "{{ cilex_root_dir }}/cvat"
cvat_data_dir: "{{ cilex_data_dir }}/cvat"
cvat_postgres_db: cvat
cvat_postgres_user: root
cvat_postgres_password: change-me
cvat_admin_user: admin
cvat_admin_email: admin@cilex.internal
cvat_admin_password: change-me
cvat_create_admin: true
cvat_numprocs_default: 1

service_build_root: "{{ cilex_root_dir }}/services"
service_deployments: []

gpu_nvidia_driver_package: nvidia-driver-550-server
gpu_nvidia_container_toolkit_package: nvidia-container-toolkit
gpu_docker_daemon_path: /etc/docker/daemon.json

edge_agent_image: cilex/edge-agent:production
edge_gateway_base_dir: "{{ cilex_root_dir }}/edge-agent"
edge_gateway_config_dir: "{{ edge_gateway_base_dir }}/config"
edge_gateway_pki_dir: "{{ edge_gateway_base_dir }}/pki"
edge_gateway_build_context_dir: "{{ edge_gateway_base_dir }}/build-context"
edge_gateway_data_dir: "{{ cilex_data_dir }}/edge-agent"
edge_gateway_buffer_dir: "{{ edge_gateway_data_dir }}/buffer"
edge_gateway_buffer_budget_bytes: 21474836480
edge_gateway_metrics_port: 9090

site_edge_base_dir: "{{ cilex_root_dir }}/site-edge"
site_edge_config_dir: "{{ site_edge_base_dir }}/config"
site_edge_pki_dir: "{{ site_edge_base_dir }}/pki"
site_edge_build_context_dir: "{{ site_edge_base_dir }}/build-context"
site_edge_data_dir: "{{ cilex_data_dir }}/site-edge"
site_edge_buffer_dir: "{{ site_edge_data_dir }}/buffer"
site_edge_buffer_budget_bytes: 21474836480
site_edge_metrics_port: 9090
site_edge_local_minio_data_dir: "{{ site_edge_data_dir }}/minio"
site_edge_local_minio_api_port: 9000
site_edge_local_minio_console_port: 9001
site_edge_local_minio_root_user: minioadmin
site_edge_local_minio_root_password: minioadmin123
site_edge_local_minio_bucket: frame-blobs
site_edge_local_minio_container_name: site-buffer-minio
site_edge_agent_container_name: site-edge-agent
site_kafka_secret_root: "{{ cilex_config_dir }}/site-secrets"

kafka_cluster_id: MkU3OEVBNTcwNTJENDM2Qk
kafka_internal_port: 9092
kafka_client_port: 9093
kafka_controller_port: 9094
kafka_base_dir: "{{ cilex_root_dir }}/kafka"
kafka_config_dir: "{{ kafka_base_dir }}/config"
kafka_tls_dir: "{{ kafka_base_dir }}/tls"
kafka_data_dir: "{{ cilex_data_dir }}/kafka"
kafka_inter_broker_user: svc-kafka-broker
kafka_inter_broker_password: change-me
kafka_admin_user: ops-kafka-admin
kafka_admin_password: change-me
kafka_ssl_keystore_password: change-me
kafka_ssl_key_password: change-me
kafka_ssl_truststore_password: change-me

nats_client_port: 4222
nats_http_port: 8222
nats_base_dir: "{{ cilex_root_dir }}/nats"
nats_config_dir: "{{ nats_base_dir }}/config"
nats_pki_dir: "{{ nats_base_dir }}/pki"
nats_data_dir: "{{ cilex_data_dir }}/nats"
nats_ops_admin_cn: ops-admin
nats_jetstream_max_mem_store: 1G
nats_jetstream_max_file_store: 10G

timescaledb_port: 5432
timescaledb_base_dir: "{{ cilex_root_dir }}/timescaledb"
timescaledb_initdb_dir: "{{ timescaledb_base_dir }}/initdb"
timescaledb_data_dir: "{{ cilex_data_dir }}/timescaledb"
timescaledb_postgres_user: cilex
timescaledb_postgres_password: cilex_dev_password
timescaledb_postgres_db: vidanalytics

minio_api_port: 9000
minio_console_port: 9001
minio_base_dir: "{{ cilex_root_dir }}/minio"
minio_policy_dir: "{{ minio_base_dir }}/lifecycle"
minio_data_dir: "{{ cilex_data_dir }}/minio"
minio_root_user: minioadmin
minio_root_password: minioadmin123
minio_buckets:
  - raw-video
  - frame-blobs
  - decoded-frames
  - event-clips
  - debug-traces
  - thumbnails
  - archive-warm
  - mtmc-checkpoints
minio_lifecycle_rules:
  - bucket: frame-blobs
    expiration_days: 7
  - bucket: decoded-frames
    expiration_days: 7
  - bucket: raw-video
    expiration_days: 30
  - bucket: event-clips
    expiration_days: 90
  - bucket: thumbnails
    expiration_days: 30
  - bucket: archive-warm
    expiration_days: 90
  - bucket: debug-traces
    expiration_days: 30
  - bucket: mtmc-checkpoints
    expiration_days: 7

triton_http_port: 8000
triton_grpc_port: 8001
triton_metrics_port: 8002
triton_base_dir: "{{ cilex_root_dir }}/triton"
triton_model_repository_dir: "{{ triton_base_dir }}/models"
triton_container_runtime: nvidia
triton_gpu_devices:
  - "0"

prometheus_port: 9090
grafana_port: 3000
loki_port: 3100
node_exporter_port: 9100
promtail_http_port: 9080
monitoring_base_dir: "{{ cilex_root_dir }}/monitoring"
monitoring_prometheus_dir: "{{ monitoring_base_dir }}/prometheus"
monitoring_prometheus_data_dir: "{{ cilex_data_dir }}/prometheus"
monitoring_grafana_dir: "{{ monitoring_base_dir }}/grafana"
monitoring_grafana_data_dir: "{{ cilex_data_dir }}/grafana"
monitoring_loki_dir: "{{ monitoring_base_dir }}/loki"
monitoring_loki_data_dir: "{{ cilex_data_dir }}/loki"
monitoring_promtail_dir: "{{ monitoring_base_dir }}/promtail"
monitoring_promtail_data_dir: "{{ cilex_data_dir }}/promtail"
monitoring_textfile_dir: /var/lib/node_exporter/textfile_collector
monitoring_scrape_interval: 15s
monitoring_evaluation_interval: 15s
monitoring_loki_retention: 744h
grafana_admin_user: admin
grafana_admin_password: admin
monitoring_clock_targets: []
