- name: Register MTMC monitoring assets
  hosts: monitoring
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    mtmc_host_metrics_port_default: 8080
  pre_tasks:
    - name: Initialise the MTMC scrape target list
      ansible.builtin.set_fact:
        mtmc_scrape_targets: []

    - name: Build MTMC scrape target list
      ansible.builtin.set_fact:
        mtmc_scrape_targets: "{{ mtmc_scrape_targets + [(hostvars[item].ansible_host | default(item)) ~ ':' ~ (hostvars[item].mtmc_host_metrics_port | default(mtmc_host_metrics_port_default) | string)] }}"
      loop: "{{ groups.get('services', []) }}"
      when: hostvars[item].mtmc_enabled | default(true) | bool

  roles:
    - common

  tasks:
    - name: Ensure monitoring directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ monitoring_prometheus_dir }}"
        - "{{ monitoring_prometheus_dir }}/rules"
        - "{{ monitoring_grafana_dir }}"
        - "{{ monitoring_grafana_dir }}/dashboards"

    - name: Copy MTMC Prometheus alerts
      ansible.builtin.copy:
        src: "{{ repo_root }}/infra/prometheus/rules/mtmc-alerts.yml"
        dest: "{{ monitoring_prometheus_dir }}/rules/mtmc-alerts.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Copy MTMC Grafana dashboard
      ansible.builtin.copy:
        src: "{{ repo_root }}/infra/grafana/dashboards/mtmc-health.json"
        dest: "{{ monitoring_grafana_dir }}/dashboards/mtmc-health.json"
        owner: root
        group: root
        mode: "0644"

    - name: Render Prometheus config with MTMC scrape targets
      ansible.builtin.template:
        src: ../templates/monitoring/prometheus.yml.j2
        dest: "{{ monitoring_prometheus_dir }}/prometheus.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Inspect Prometheus container
      community.docker.docker_container_info:
        name: prometheus
      register: mtmc_prometheus_container

    - name: Reload Prometheus after MTMC scrape changes
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_port }}/-/reload"
        method: POST
        status_code: 200
      when:
        - mtmc_prometheus_container.exists
        - mtmc_prometheus_container.container.State.Running | default(false)

    - name: Check Prometheus targets API
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_port }}/api/v1/targets"
        status_code: 200
      when:
        - mtmc_prometheus_container.exists
        - mtmc_prometheus_container.container.State.Running | default(false)
