---
- name: Deploy NATS with JetStream and mTLS
  hosts: nats
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Validate NATS PKI inputs
      ansible.builtin.assert:
        that:
          - nats_site_id is defined
          - nats_server_cert_src is defined
          - nats_server_key_src is defined
          - nats_root_ca_src is defined
        fail_msg: "NATS requires nats_site_id plus local PKI source paths generated by infra/pki/bootstrap-site.sh."

  roles:
    - common

  tasks:
    - name: Create NATS directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ nats_base_dir }}"
        - "{{ nats_config_dir }}"
        - "{{ nats_pki_dir }}"
        - "{{ nats_data_dir }}"

    - name: Copy NATS server certificate
      ansible.builtin.copy:
        src: "{{ nats_server_cert_src }}"
        dest: "{{ nats_pki_dir }}/server.crt"
        owner: root
        group: root
        mode: "0644"

    - name: Copy NATS server private key
      ansible.builtin.copy:
        src: "{{ nats_server_key_src }}"
        dest: "{{ nats_pki_dir }}/server.key"
        owner: root
        group: root
        mode: "0600"

    - name: Copy NATS root CA
      ansible.builtin.copy:
        src: "{{ nats_root_ca_src }}"
        dest: "{{ nats_pki_dir }}/root_ca.crt"
        owner: root
        group: root
        mode: "0644"

    - name: Render NATS server config
      ansible.builtin.template:
        src: ../templates/nats/nats-server.conf.j2
        dest: "{{ nats_config_dir }}/nats-server.conf"
        owner: root
        group: root
        mode: "0644"

    - name: Start NATS container
      community.docker.docker_container:
        name: "nats-{{ nats_site_id }}"
        image: "{{ nats_image }}"
        state: started
        restart_policy: unless-stopped
        network_mode: host
        command:
          - -c
          - /etc/nats/nats-server.conf
        volumes:
          - "{{ nats_config_dir }}:/etc/nats"
          - "{{ nats_pki_dir }}:/etc/nats/pki:ro"
          - "{{ nats_data_dir }}:/var/lib/nats"

    - name: Wait for NATS client listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ nats_client_port }}"
        delay: 3
        timeout: 60

    - name: Wait for NATS monitoring listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ nats_http_port }}"
        delay: 3
        timeout: 60

    - name: Smoke test NATS health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ nats_http_port }}/healthz"
        status_code: 200

    - name: Smoke test NATS JetStream endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ nats_http_port }}/jsz"
        status_code: 200
        return_content: true
      register: nats_jsz

    - name: Assert JetStream is enabled
      ansible.builtin.assert:
        that:
          - "'memory' in nats_jsz.content"
          - "'storage' in nats_jsz.content"

