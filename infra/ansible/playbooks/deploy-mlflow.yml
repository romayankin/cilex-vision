---
- name: Deploy MLflow
  hosts: mlflow
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    timescaledb_primary_host: "{{ hostvars[groups['timescaledb'][0]].ansible_host | default(groups['timescaledb'][0]) }}"
    minio_primary_host: "{{ hostvars[groups['minio'][0]].ansible_host | default(groups['minio'][0]) }}"
  pre_tasks:
    - name: Validate MLflow dependencies
      ansible.builtin.assert:
        that:
          - groups['timescaledb'] | length >= 1
          - groups['minio'] | length >= 1
        fail_msg: "deploy-mlflow.yml requires at least one timescaledb host and one minio host."

  roles:
    - common

  tasks:
    - name: Wait for TimescaleDB to be reachable
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ timescaledb_port }}"
        delay: 3
        timeout: 120
      delegate_to: "{{ groups['timescaledb'][0] }}"

    - name: Create MLflow directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ mlflow_base_dir }}"
        - "{{ mlflow_data_dir }}"

    - name: Check whether the MLflow database exists
      ansible.builtin.command:
        cmd: >-
          docker exec timescaledb
          psql -U {{ mlflow_postgres_user }} -d postgres
          -tAc "SELECT 1 FROM pg_database WHERE datname = '{{ mlflow_postgres_db }}';"
      delegate_to: "{{ groups['timescaledb'][0] }}"
      register: mlflow_db_exists
      changed_when: false
      no_log: true

    - name: Create the MLflow database
      ansible.builtin.command:
        cmd: >-
          docker exec timescaledb
          psql -U {{ mlflow_postgres_user }} -d postgres
          -c "CREATE DATABASE {{ mlflow_postgres_db }};"
      delegate_to: "{{ groups['timescaledb'][0] }}"
      when: mlflow_db_exists.stdout | trim != "1"
      no_log: true

    - name: Start MLflow container
      community.docker.docker_container:
        name: mlflow
        image: "{{ mlflow_image }}"
        state: started
        restart_policy: unless-stopped
        network_mode: host
        env:
          POSTGRES_USER: "{{ mlflow_postgres_user }}"
          POSTGRES_PASSWORD: "{{ mlflow_postgres_password }}"
          AWS_ACCESS_KEY_ID: "{{ minio_root_user }}"
          AWS_SECRET_ACCESS_KEY: "{{ minio_root_password }}"
          MLFLOW_S3_ENDPOINT_URL: "http://{{ minio_primary_host }}:{{ minio_api_port }}"
          AWS_DEFAULT_REGION: "us-east-1"
        command:
          - /bin/sh
          - -ec
          - >-
            pip install --no-cache-dir mlflow==2.14.3 psycopg2-binary==2.9.9 boto3==1.34.144;
            exec mlflow server
            --host 0.0.0.0
            --port {{ mlflow_port }}
            --backend-store-uri postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@{{ timescaledb_primary_host }}:{{ timescaledb_port }}/{{ mlflow_postgres_db }}
            --artifacts-destination s3://{{ mlflow_artifact_bucket }}/{{ mlflow_artifact_prefix }}
            --serve-artifacts
      no_log: true

    - name: Wait for MLflow
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ mlflow_port }}"
        delay: 5
        timeout: 240

    - name: Smoke test MLflow
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ mlflow_port }}/"
        status_code: 200
      register: mlflow_health
      retries: 12
      delay: 10
      until: mlflow_health.status == 200
