---
- name: Prepare new site onboarding inputs
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    target_site_group_resolved: "{{ site_group | default(target_site_group | default('')) }}"
  tasks:
    - name: Validate the requested site group
      ansible.builtin.assert:
        that:
          - target_site_group_resolved | length > 0
          - target_site_group_resolved in groups
        fail_msg: "Set site_group=<inventory site group> when running add-site.yml."

    - name: Derive site-specific runtime values
      ansible.builtin.set_fact:
        target_site_group_resolved: "{{ target_site_group_resolved }}"
        selected_site_inventory_host: "{{ groups[target_site_group_resolved] | first }}"
        selected_site_id: "{{ hostvars[groups[target_site_group_resolved] | first].site_id }}"
        selected_site_db_id: "{{ hostvars[groups[target_site_group_resolved] | first].site_db_id }}"
        selected_site_name: "{{ hostvars[groups[target_site_group_resolved] | first].site_name | default(hostvars[groups[target_site_group_resolved] | first].site_id) }}"
        selected_site_cameras: "{{ hostvars[groups[target_site_group_resolved] | first].site_cameras | default([]) }}"
        selected_site_clock_targets: "{{ hostvars[groups[target_site_group_resolved] | first].site_clock_targets | default([]) }}"
        selected_edge_hosts: "{{ groups[target_site_group_resolved] | intersect(groups.get('edge_gateways', [])) }}"
        selected_nats_hosts: "{{ groups[target_site_group_resolved] | intersect(groups.get('nats', [])) }}"
        selected_timescaledb_host: "{{ groups.get('timescaledb', []) | first | default('') }}"
        selected_monitoring_hosts: "{{ groups.get('monitoring', []) }}"
        selected_kafka_host: "{{ groups.get('kafka', []) | first | default('') }}"
        selected_site_pki_output_dir: "{{ hostvars[groups[target_site_group_resolved] | first].site_pki_output_dir | default(repo_root ~ '/artifacts/pki/' ~ hostvars[groups[target_site_group_resolved] | first].site_id) }}"
        selected_site_kafka_scram_user: "{{ hostvars[groups[target_site_group_resolved] | first].site_kafka_scram_user | default('svc-ingress-bridge-' ~ hostvars[groups[target_site_group_resolved] | first].site_id) }}"

    - name: Validate central and site host dependencies
      ansible.builtin.assert:
        that:
          - selected_site_id | length > 0
          - selected_site_db_id | length > 0
          - selected_site_cameras | length > 0
          - selected_edge_hosts | length > 0
          - selected_nats_hosts | length > 0
          - selected_timescaledb_host | length > 0
          - selected_kafka_host | length > 0
          - selected_monitoring_hosts | length > 0
          - step_ca_url is defined
          - step_ca_fingerprint is defined
        fail_msg: "Site onboarding requires site metadata, site cameras, edge + NATS hosts, and step-ca bootstrap settings."

    - name: Ensure the site PKI output directory exists
      ansible.builtin.file:
        path: "{{ selected_site_pki_output_dir }}"
        state: directory
        mode: "0755"

    - name: Check whether the site PKI bundle already exists
      ansible.builtin.stat:
        path: "{{ selected_site_pki_output_dir }}/manifest.env"
      register: selected_site_manifest

    - name: Bootstrap PKI for the site when missing
      ansible.builtin.command:
        cmd: "{{ repo_root }}/infra/pki/bootstrap-site.sh"
      environment:
        SITE_ID: "{{ selected_site_id }}"
        STEP_CA_URL: "{{ step_ca_url }}"
        STEP_CA_FINGERPRINT: "{{ step_ca_fingerprint }}"
        STEP_PROVISIONER: "{{ step_provisioner | default('ops-bootstrap') }}"
        STEP_PROVISIONER_PASSWORD_FILE: "{{ step_provisioner_password_file | default('') }}"
        OUTPUT_DIR: "{{ selected_site_pki_output_dir }}"
      when: not selected_site_manifest.stat.exists or (site_force_pki_rotate | default(false) | bool)

- name: Deploy site-local NATS for the selected site
  hosts: "{{ hostvars['localhost'].target_site_group_resolved }}:&nats"
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    nats_site_id: "{{ hostvars['localhost'].selected_site_id }}"
    nats_server_cert_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/nats-server/server.crt"
    nats_server_key_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/nats-server/server.key"
    nats_root_ca_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/nats-server/root_ca.crt"
  roles:
    - common
  tasks:
    - name: Validate NATS PKI inputs for the new site
      ansible.builtin.assert:
        that:
          - nats_site_id | length > 0
        fail_msg: "NATS deployment requires a resolved site_id."

    - name: Create NATS directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ nats_base_dir }}"
        - "{{ nats_config_dir }}"
        - "{{ nats_pki_dir }}"
        - "{{ nats_data_dir }}"

    - name: Copy NATS server certificate bundle for the new site
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ nats_server_cert_src }}"
          dest: "{{ nats_pki_dir }}/server.crt"
          mode: "0644"
        - src: "{{ nats_server_key_src }}"
          dest: "{{ nats_pki_dir }}/server.key"
          mode: "0600"
        - src: "{{ nats_root_ca_src }}"
          dest: "{{ nats_pki_dir }}/root_ca.crt"
          mode: "0644"

    - name: Render NATS server config
      ansible.builtin.template:
        src: ../templates/nats/nats-server.conf.j2
        dest: "{{ nats_config_dir }}/nats-server.conf"
        owner: root
        group: root
        mode: "0644"

    - name: Start NATS container for the new site
      community.docker.docker_container:
        name: "nats-{{ nats_site_id }}"
        image: "{{ nats_image }}"
        state: started
        restart_policy: unless-stopped
        network_mode: host
        command:
          - -c
          - /etc/nats/nats-server.conf
        volumes:
          - "{{ nats_config_dir }}:/etc/nats"
          - "{{ nats_pki_dir }}:/etc/nats/pki:ro"
          - "{{ nats_data_dir }}:/var/lib/nats"

    - name: Wait for site-local NATS listeners
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ item }}"
        delay: 3
        timeout: 60
      loop:
        - "{{ nats_client_port }}"
        - "{{ nats_http_port }}"

    - name: Smoke test site-local NATS health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ nats_http_port }}/healthz"
        status_code: 200

- name: Deploy site-edge hosts for the selected site
  hosts: "{{ hostvars['localhost'].target_site_group_resolved }}:&edge_gateways"
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    site_id: "{{ hostvars['localhost'].selected_site_id }}"
    site_name: "{{ hostvars['localhost'].selected_site_name }}"
    site_cameras: "{{ hostvars['localhost'].selected_site_cameras }}"
    edge_nats_client_cert_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/edge-agent/client.crt"
    edge_nats_client_key_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/edge-agent/client.key"
    edge_nats_root_ca_src: "{{ hostvars['localhost'].selected_site_pki_output_dir }}/edge-agent/root_ca.crt"
    edge_nats_url: "{{ hostvars[inventory_hostname].edge_nats_url | default('tls://' ~ (hostvars[(hostvars['localhost'].selected_nats_hosts | first)].ansible_host | default(hostvars['localhost'].selected_nats_hosts | first)) ~ ':' ~ nats_client_port) }}"
  roles:
    - common
    - site-edge

- name: Provision site-specific Kafka credentials and ACLs
  hosts: "{{ hostvars['localhost'].selected_kafka_host }}"
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    site_kafka_scram_user: "{{ hostvars['localhost'].selected_site_kafka_scram_user }}"
    site_kafka_secret_dir: "{{ site_kafka_secret_root }}/{{ hostvars['localhost'].selected_site_id }}"
    site_kafka_secret_file: "{{ site_kafka_secret_dir }}/ingress-bridge-kafka.password"
    kafka_container_name: "kafka-{{ kafka_node_id }}"
  tasks:
    - name: Create the site Kafka secret directory
      ansible.builtin.file:
        path: "{{ site_kafka_secret_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Check whether the site Kafka SCRAM password already exists
      ansible.builtin.stat:
        path: "{{ site_kafka_secret_file }}"
      register: site_kafka_secret_stat

    - name: Generate a site Kafka SCRAM password
      ansible.builtin.command:
        cmd: openssl rand -hex 24
      register: site_kafka_generated_password
      changed_when: true
      when: not site_kafka_secret_stat.stat.exists

    - name: Persist the site Kafka SCRAM password when newly generated
      ansible.builtin.copy:
        dest: "{{ site_kafka_secret_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ site_kafka_generated_password.stdout }}\n"
        force: false
      when: not site_kafka_secret_stat.stat.exists
      no_log: true

    - name: Read the site Kafka SCRAM password
      ansible.builtin.slurp:
        src: "{{ site_kafka_secret_file }}"
      register: site_kafka_password_file
      no_log: true

    - name: Record the site Kafka SCRAM password
      ansible.builtin.set_fact:
        site_kafka_scram_password: "{{ site_kafka_password_file.content | b64decode | trim }}"
      no_log: true

    - name: Upsert the site ingress-bridge SCRAM credential
      ansible.builtin.command:
        cmd: >-
          docker exec {{ kafka_container_name }}
          /opt/bitnami/kafka/bin/kafka-configs.sh
          --bootstrap-server localhost:{{ kafka_client_port }}
          --command-config /opt/bitnami/kafka/config/admin.properties
          --alter
          --entity-type users
          --entity-name {{ site_kafka_scram_user }}
          --add-config SCRAM-SHA-256=[password={{ site_kafka_scram_password }}]
      changed_when: false
      no_log: true

    - name: List site ingress-bridge ACLs
      ansible.builtin.command:
        cmd: >-
          docker exec {{ kafka_container_name }}
          /opt/bitnami/kafka/bin/kafka-acls.sh
          --bootstrap-server localhost:{{ kafka_client_port }}
          --command-config /opt/bitnami/kafka/config/admin.properties
          --list
          --principal User:{{ site_kafka_scram_user }}
      register: site_kafka_acl_list
      changed_when: false
      no_log: true

    - name: Add the site ingress-bridge topic ACLs
      ansible.builtin.command:
        cmd: >-
          docker exec {{ kafka_container_name }}
          /opt/bitnami/kafka/bin/kafka-acls.sh
          --bootstrap-server localhost:{{ kafka_client_port }}
          --command-config /opt/bitnami/kafka/config/admin.properties
          --add
          --allow-principal User:{{ site_kafka_scram_user }}
          --operation Write
          --operation Describe
          --topic frames.sampled.refs
      when: ('User:' ~ site_kafka_scram_user) not in site_kafka_acl_list.stdout
      no_log: true

- name: Register the new site in the topology database
  hosts: "{{ hostvars['localhost'].selected_timescaledb_host }}"
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    site_bootstrap_sql_path: "{{ cilex_config_dir }}/site-bootstrap/{{ hostvars['localhost'].selected_site_id }}-register.sql"
  tasks:
    - name: Create the topology bootstrap directory
      ansible.builtin.file:
        path: "{{ site_bootstrap_sql_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render site topology registration SQL
      ansible.builtin.copy:
        dest: "{{ site_bootstrap_sql_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          INSERT INTO sites (site_id, name)
          VALUES ('{{ hostvars["localhost"].selected_site_db_id }}', '{{ hostvars["localhost"].selected_site_name | replace("'", "''") }}')
          ON CONFLICT (site_id) DO UPDATE SET name = EXCLUDED.name;
          {% for camera in hostvars["localhost"].selected_site_cameras %}
          INSERT INTO cameras (
              camera_id,
              site_id,
              name,
              rtsp_uri,
              location_description,
              latitude,
              longitude,
              status,
              config_json
          ) VALUES (
              '{{ camera.camera_id | replace("'", "''") }}',
              '{{ hostvars["localhost"].selected_site_db_id }}',
              '{{ camera.name | default(camera.camera_id) | replace("'", "''") }}',
              {% if camera.rtsp_url is defined and camera.rtsp_url %}'{{ camera.rtsp_url | replace("'", "''") }}'{% else %}NULL{% endif %},
              {% if camera.location_description is defined and camera.location_description %}'{{ camera.location_description | replace("'", "''") }}'{% else %}NULL{% endif %},
              {% if camera.latitude is defined %}{{ camera.latitude }}{% else %}NULL{% endif %},
              {% if camera.longitude is defined %}{{ camera.longitude }}{% else %}NULL{% endif %},
              'offline',
              '{{ {"zone_id": camera.zone_id | default(None), "enabled": camera.enabled | default(false)} | to_json | replace("'", "''") }}'::jsonb
          )
          ON CONFLICT (camera_id) DO UPDATE SET
              name = EXCLUDED.name,
              rtsp_uri = EXCLUDED.rtsp_uri,
              location_description = EXCLUDED.location_description,
              latitude = EXCLUDED.latitude,
              longitude = EXCLUDED.longitude,
              status = EXCLUDED.status,
              config_json = EXCLUDED.config_json;
          {% endfor %}

    - name: Apply site topology registration SQL
      ansible.builtin.shell: >-
        docker exec -i timescaledb
        psql -v ON_ERROR_STOP=1
        -U {{ timescaledb_postgres_user }}
        -d {{ timescaledb_postgres_db }}
        < {{ site_bootstrap_sql_path }}
      args:
        executable: /bin/bash
      changed_when: true

    - name: Check how many cameras were registered for the site
      ansible.builtin.shell: >-
        docker exec timescaledb
        psql -t -A
        -U {{ timescaledb_postgres_user }}
        -d {{ timescaledb_postgres_db }}
        -c "SELECT COUNT(*) FROM cameras WHERE site_id = '{{ hostvars['localhost'].selected_site_db_id }}';"
      args:
        executable: /bin/bash
      register: site_camera_count_check
      changed_when: false

    - name: Assert the expected camera count is present
      ansible.builtin.assert:
        that:
          - (site_camera_count_check.stdout | trim | int) >= (hostvars['localhost'].selected_site_cameras | length)
        fail_msg: "Not all site cameras were registered in the topology database."

- name: Reload monitoring for the new site
  hosts: monitoring
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    effective_monitoring_clock_targets: "{{ (monitoring_clock_targets | default([])) + (hostvars['localhost'].selected_site_clock_targets | default([])) }}"
  tasks:
    - name: Render Prometheus config with the new site targets
      ansible.builtin.template:
        src: ../templates/monitoring/prometheus.yml.j2
        dest: "{{ monitoring_prometheus_dir }}/prometheus.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Render clock target file with the new site targets
      ansible.builtin.copy:
        dest: "{{ monitoring_promtail_dir }}/clock-targets.json"
        owner: root
        group: root
        mode: "0644"
        content: "{{ effective_monitoring_clock_targets | to_nice_json }}"

    - name: Reload Prometheus after adding the site
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_port }}/-/reload"
        method: POST
        status_code: 200

- name: Smoke test site-local NATS after onboarding
  hosts: "{{ hostvars['localhost'].target_site_group_resolved }}:&nats"
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Check site-local NATS health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ nats_http_port }}/healthz"
        status_code: 200

- name: Smoke test site-edge hosts after onboarding
  hosts: "{{ hostvars['localhost'].target_site_group_resolved }}:&edge_gateways"
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Check site-edge metrics endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ site_edge_metrics_port }}/metrics"
        status_code: 200

    - name: Check site-local MinIO health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ site_edge_local_minio_api_port }}/minio/health/live"
        status_code: 200

- name: Smoke test monitoring health after onboarding
  hosts: monitoring
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Check Prometheus remains healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_port }}/-/healthy"
        status_code: 200
