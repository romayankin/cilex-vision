---
- name: Deploy TimescaleDB
  hosts: timescaledb
  become: true
  gather_facts: false
  collections:
    - community.docker
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"

  roles:
    - common

  tasks:
    - name: Create TimescaleDB directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ timescaledb_base_dir }}"
        - "{{ timescaledb_initdb_dir }}"
        - "{{ timescaledb_data_dir }}"

    - name: Copy TimescaleDB bootstrap SQL
      ansible.builtin.copy:
        src: "{{ repo_root }}/infra/postgres/initdb/01-bootstrap.sql"
        dest: "{{ timescaledb_initdb_dir }}/01-bootstrap.sql"
        owner: root
        group: root
        mode: "0644"

    - name: Start TimescaleDB container
      community.docker.docker_container:
        name: timescaledb
        image: "{{ timescaledb_image }}"
        state: started
        restart_policy: unless-stopped
        network_mode: host
        env:
          POSTGRES_USER: "{{ timescaledb_postgres_user }}"
          POSTGRES_PASSWORD: "{{ timescaledb_postgres_password }}"
          POSTGRES_DB: "{{ timescaledb_postgres_db }}"
        volumes:
          - "{{ timescaledb_data_dir }}:/var/lib/postgresql/data"
          - "{{ timescaledb_initdb_dir }}:/docker-entrypoint-initdb.d:ro"
      no_log: true

    - name: Wait for TimescaleDB to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ timescaledb_port }}"
        delay: 5
        timeout: 120

    - name: Smoke test pg_isready
      ansible.builtin.command:
        cmd: >-
          docker exec timescaledb
          pg_isready -U {{ timescaledb_postgres_user }} -d {{ timescaledb_postgres_db }}
      register: timescaledb_isready
      changed_when: false
      retries: 10
      delay: 6
      until: timescaledb_isready.rc == 0
      no_log: true

    - name: Smoke test TimescaleDB extension
      ansible.builtin.command:
        cmd: >-
          docker exec timescaledb
          psql -U {{ timescaledb_postgres_user }} -d {{ timescaledb_postgres_db }}
          -Atqc "SELECT extname FROM pg_extension WHERE extname = 'timescaledb';"
      register: timescaledb_extension
      changed_when: false
      no_log: true

    - name: Assert TimescaleDB extension is installed
      ansible.builtin.assert:
        that:
          - timescaledb_extension.stdout == "timescaledb"

