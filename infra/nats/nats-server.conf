# P0-D08 NATS security template
# Copy the site-specific user blocks per site. CN identity comes from the
# client certificate subject because client certs omit SANs and verify_and_map
# falls back to the subject.

server_name: "nats-site-a"
listen: "0.0.0.0:4222"
http: "0.0.0.0:8222"

jetstream {
  store_dir: "/var/lib/nats/jetstream"
  max_mem_store: 1G
  max_file_store: 10G
}

tls {
  cert_file: "/etc/nats/pki/server.crt"
  key_file: "/etc/nats/pki/server.key"
  ca_file: "/etc/nats/pki/root_ca.crt"
  verify: true
  verify_and_map: true
  timeout: 2
}

authorization {
  default_permissions = {
    publish = []
    subscribe = []
  }

  users = [
    {
      user: "CN=edge-site-site-a"
      permissions: {
        publish: [
          "frames.live.site-a.>",
          "frames.replay.site-a.>"
        ]
        subscribe: [
          "_INBOX.>"
        ]
      }
    },
    {
      user: "CN=bridge-site-site-a"
      permissions: {
        publish: [
          "$JS.API.CONSUMER.MSG.NEXT.CILEX_SITE_A.INGRESS_BRIDGE_SITE_A",
          "$JS.API.CONSUMER.INFO.CILEX_SITE_A.INGRESS_BRIDGE_SITE_A",
          "$JS.ACK.CILEX_SITE_A.INGRESS_BRIDGE_SITE_A.>",
          "frames.dlq.site-a.>"
        ]
        subscribe: [
          "_INBOX.>"
        ]
      }
    },
    {
      user: "CN=ops-admin"
      permissions: {
        publish: [
          ">"
        ]
        subscribe: [
          ">"
        ]
      }
    }
  ]
}
