# Edge-agent config for local docker-compose dev stack.
# The edge-agent's pydantic Settings lacks env_nested_delimiter,
# so nats/minio settings must come from YAML (not env vars).

site_id: pilot-site

nats:
  url: nats://nats:4222

minio:
  endpoint: minio:9000
  access_key: minioadmin
  secret_key: minioadmin123
  secure: false
  bucket: frame-blobs

motion:
  pixel_threshold: 15
  motion_threshold: 0.01
  scene_change_threshold: 0.80
  reference_update_interval_s: 60
  max_fps: 2

cameras:
  - camera_id: cam-1
    rtsp_url: "rtsp://admin:Qwerty12@192.168.1.67:554/Streaming/Channels/101"
    enabled: true
  - camera_id: cam-2
    rtsp_url: "rtsp://admin:Qwerty12@192.168.1.64:554/Streaming/Channels/101"
    enabled: true
