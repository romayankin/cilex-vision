        are updated.  Otherwise a new edge is inserted.


        Required roles: `admin`. Admin bypasses camera scope; detections, tracks,
        and events apply non-admin `camera_scope` filtering.'
      operationId: upsert_edge_topology__site_id__edges_put
      parameters:
      - name: site_id
