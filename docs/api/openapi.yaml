      properties:
        object_class:
          type: string
          title: Object Class
        p50_ms:
          type: number
          title: P50 Ms
        p90_ms:
          type: number
          title: P90 Ms
        p99_ms:
          type: number
          title: P99 Ms
        sample_count:
          type: integer
          title: Sample Count
          default: 0
        last_updated:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Updated
      type: object
      required:
      - object_class
      - p50_ms
      - p90_ms
      - p99_ms
      title: TransitTimeDistribution
      description: 'Transit-time distribution for one object class on one edge.


        ``p50_ms`` / ``p90_ms`` / ``p99_ms`` represent the 50th, 90th and 99th

        percentile transit times in milliseconds.  ``sample_count`` tracks

        how many Re-ID matches have contributed; zero means the distribution

        is still seeded (not yet learned from data).'
    TransitionEdge:
      properties:
        edge_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Edge Id
        camera_a_id:
          type: string
