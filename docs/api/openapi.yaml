        schema:
          type: string
          title: Site Id
        example: 11111111-1111-1111-1111-111111111111
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeCreateRequest'
            example:
              camera_a_id: cam-entrance
              camera_b_id: cam-lobby
              transition_time_s: 12.0
              confidence: 0.95
              enabled: true
      responses:
