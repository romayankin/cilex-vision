openapi: 3.1.0
info:
  title: Cilex Vision Query API
  description: Read-oriented API for detections, tracks, events, site topology, and
    engineering debug traces. This document is generated from the real FastAPI app
    and patched with auth and public-endpoint metadata.
  version: 1.0.0
paths:
  /detections:
    get:
      tags:
      - detections
      summary: List Detections
      description: 'Query detections with filtering and pagination.


        Required roles: `admin`, `operator`, `viewer`, `engineering`. Admin bypasses
        camera scope; detections, tracks, and events apply non-admin `camera_scope`
        filtering.'
      operationId: list_detections_detections_get
      parameters:
      - name: camera_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by camera ID
          title: Camera Id
        description: Filter by camera ID
        example: cam-01
      - name: start
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Start time (inclusive)
          title: Start
        description: Start time (inclusive)
        example: '2026-04-10T00:00:00Z'
      - name: end
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: End time (exclusive)
          title: End
        description: End time (exclusive)
        example: '2026-04-10T23:59:59Z'
      - name: class
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by object class
          title: Class
        description: Filter by object class
        example: person
      - name: min_confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          description: Minimum confidence
          title: Min Confidence
        description: Minimum confidence
        example: 0.6
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
        example: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 50
          title: Limit
        example: 10
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Missing, expired, or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Authentication required
        '403':
          description: Authenticated user does not have the required role or scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Role 'viewer' not authorized for this resource
      security:
      - cookieAuth: []
      x-cilex-allowed-roles:
      - admin
      - operator
      - viewer
      - engineering
