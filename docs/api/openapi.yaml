          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Role 'viewer' not authorized for this resource
      security:
      - cookieAuth: []
      x-cilex-allowed-roles:
      - admin
      - operator
      - viewer
      - engineering
