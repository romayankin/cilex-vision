<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Track continuity examples</title>
  <desc id="desc">Track remains the same across short occlusion and becomes new after scene exit.</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <text x="56" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Tracking rule</text>
  <text x="56" y="92" font-family="Arial, sans-serif" font-size="22" fill="#334155">Keep one track ID through short occlusion. Start a new ID after exit or a long gap.</text>

  <line x1="80" y1="220" x2="890" y2="220" stroke="#94a3b8" stroke-width="4"/>
  <text x="78" y="250" font-family="Arial, sans-serif" font-size="18" fill="#475569">Frame time</text>

  <rect x="120" y="176" width="90" height="44" rx="8" fill="#2563eb"/>
  <rect x="260" y="176" width="90" height="44" rx="8" fill="#2563eb"/>
  <rect x="400" y="176" width="90" height="44" rx="8" fill="#2563eb"/>
  <text x="130" y="168" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Track 17</text>
  <text x="270" y="168" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Track 17</text>
  <text x="410" y="168" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Track 17</text>

  <rect x="540" y="154" width="84" height="88" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="550" y="144" font-family="Arial, sans-serif" font-size="18" fill="#92400e">Short occlusion</text>
  <text x="558" y="196" font-family="Arial, sans-serif" font-size="18" fill="#92400e">No new ID</text>
  <text x="550" y="220" font-family="Arial, sans-serif" font-size="18" fill="#92400e">if object reappears</text>

  <rect x="700" y="176" width="90" height="44" rx="8" fill="#dc2626"/>
  <text x="692" y="168" font-family="Arial, sans-serif" font-size="18" fill="#991b1b">Track 28</text>
  <text x="672" y="288" font-family="Arial, sans-serif" font-size="22" fill="#991b1b">New ID after exit / long gap</text>

  <circle cx="165" cy="220" r="6" fill="#0f172a"/>
  <circle cx="305" cy="220" r="6" fill="#0f172a"/>
  <circle cx="445" cy="220" r="6" fill="#0f172a"/>
  <circle cx="745" cy="220" r="6" fill="#0f172a"/>
</svg>
