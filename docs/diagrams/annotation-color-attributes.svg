<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Color attribute examples</title>
  <desc id="desc">Examples of vehicle and person color crops and when to use unknown.</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <text x="58" y="56" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Color labeling rule</text>
  <text x="58" y="90" font-family="Arial, sans-serif" font-size="22" fill="#334155">Choose the dominant visible color of the labeled region. Use unknown only when it is genuinely unresolved.</text>

  <rect x="70" y="124" width="250" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="114" y="188" width="160" height="58" rx="16" fill="#3b82f6"/>
  <circle cx="142" cy="252" r="18" fill="#111827"/>
  <circle cx="246" cy="252" r="18" fill="#111827"/>
  <text x="98" y="164" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">vehicle_color = blue</text>
  <text x="96" y="288" font-family="Arial, sans-serif" font-size="18" fill="#475569">Ignore glass, wheels, trim.</text>

  <rect x="356" y="124" width="250" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="480" cy="164" r="22" fill="#fcd34d"/>
  <rect x="442" y="188" width="76" height="54" rx="12" fill="#16a34a"/>
  <rect x="434" y="242" width="34" height="50" rx="10" fill="#111827"/>
  <rect x="492" y="242" width="34" height="50" rx="10" fill="#111827"/>
  <text x="382" y="148" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">person_upper_color = green</text>
  <text x="382" y="172" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">person_lower_color = black</text>
  <text x="386" y="320" font-family="Arial, sans-serif" font-size="18" fill="#475569">Label garments, not skin or accessories.</text>

  <rect x="642" y="124" width="250" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="690" y="176" width="156" height="68" rx="18" fill="#9ca3af"/>
  <rect x="670" y="154" width="196" height="112" rx="22" fill="none" stroke="#dc2626" stroke-width="6" stroke-dasharray="12 8"/>
  <text x="672" y="146" font-family="Arial, sans-serif" font-size="20" fill="#991b1b">Too occluded / glare-heavy</text>
  <text x="694" y="288" font-family="Arial, sans-serif" font-size="22" fill="#991b1b">use unknown</text>
</svg>
